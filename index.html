<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catálogo de Contas Avançado</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    margin: 0;
}

header {
    background: #1a1a1a;
    padding: 15px;
    text-align: center;
    color: #00ffcc;
    font-size: 22px;
}

.container {
    padding: 20px;
}

input, textarea {
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin: 5px;
    width: 200px;
}

button {
    padding: 8px 12px;
    background: #00ffcc;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.catalog {
    display: grid;
    grid-template-columns: repeat(auto-fill, 220px);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #1e1e1e;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.manager {
    margin-top: 30px;
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
}

.small {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<header>Catálogo Avançado</header>

<div class="container">

    <h2>Adicionar Conta</h2>

    <input type="text" id="accountName" placeholder="Nome da Conta"><br>
    <input type="password" id="accountPassword" placeholder="Senha (opcional)">
    <button onclick="togglePassword()">👁</button><br>
    <textarea id="accountDesc" placeholder="Descrição da conta"></textarea><br>

    <button onclick="addAccount()">Adicionar Conta</button>

    <div class="catalog" id="catalog"></div>

    <div class="manager" id="manager" style="display:none;">
        <h2 id="managerTitle"></h2>
        <p id="managerDesc" class="small"></p>
        <p>Senha: <span id="managerPass">******</span> 
        <button onclick="toggleManagerPassword()">👁</button></p>

        <input type="text" id="itemName" placeholder="Nome do Item">
        <input type="number" id="itemValue" placeholder="Valor por segundo">
        <button onclick="addItem()">Adicionar Item</button>

        <div id="itemList"></div>
        <h3>Total por Segundo: <span id="totalValue">0</span></h3>
    </div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("advancedAccounts")) || [];
let selectedIndex = null;
let showPassword = false;
let showManagerPass = false;

function save(){
    localStorage.setItem("advancedAccounts", JSON.stringify(accounts));
}

function togglePassword(){
    const input = document.getElementById("accountPassword");
    input.type = input.type === "password" ? "text" : "password";
}

function addAccount(){
    const name = document.getElementById("accountName").value;
    const pass = document.getElementById("accountPassword").value;
    const desc = document.getElementById("accountDesc").value;

    if(!name) return;

    accounts.push({ name, pass, desc, items: [] });

    document.getElementById("accountName").value = "";
    document.getElementById("accountPassword").value = "";
    document.getElementById("accountDesc").value = "";

    save();
    renderCatalog();
}

function renderCatalog(){
    const catalog = document.getElementById("catalog");
    catalog.innerHTML = "";

    accounts.forEach((acc, index) => {

        let total = acc.items.reduce((sum, item) => sum + item.value, 0);

        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => openManager(index);

        card.innerHTML = `
            <h3>${acc.name}</h3>
            <p>${acc.desc || "Sem descrição"}</p>
            <p>Total: ${total.toFixed(2)} /s</p>
        `;

        catalog.appendChild(card);
    });
}

function openManager(index){
    selectedIndex = index;
    document.getElementById("manager").style.display = "block";

    const acc = accounts[index];

    document.getElementById("managerTitle").innerText = acc.name;
    document.getElementById("managerDesc").innerText = acc.desc || "Sem descrição";

    showManagerPass = false;
    document.getElementById("managerPass").innerText = acc.pass ? "******" : "Sem senha";

    renderItems();
}

function toggleManagerPassword(){
    const acc = accounts[selectedIndex];
    showManagerPass = !showManagerPass;

    document.getElementById("managerPass").innerText = showManagerPass 
        ? (acc.pass || "Sem senha") 
        : "******";
}

function addItem(){
    if(selectedIndex === null) return;

    const name = document.getElementById("itemName").value;
    const value = parseFloat(document.getElementById("itemValue").value);

    if(!name || isNaN(value)) return;

    accounts[selectedIndex].items.push({ name, value });

    document.getElementById("itemName").value = "";
    document.getElementById("itemValue").value = "";

    save();
    renderItems();
    renderCatalog();
}

function renderItems(){
    const list = document.getElementById("itemList");
    const totalElement = document.getElementById("totalValue");

    list.innerHTML = "";
    let total = 0;

    accounts[selectedIndex].items.forEach((item, index) => {
        total += item.value;

        const div = document.createElement("div");
        div.style.marginTop = "10px";
        div.innerHTML = `
            ${item.name} - ${item.value} /s
            <button onclick="removeItem(${index})">Remover</button>
        `;

        list.appendChild(div);
    });

    totalElement.innerText = total.toFixed(2);
}

function removeItem(index){
    accounts[selectedIndex].items.splice(index, 1);
    save();
    renderItems();
    renderCatalog();
}

renderCatalog();

</script>

</body>
</html>
